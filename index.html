<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FAFAFA" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon-polarist-cropped.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-polarist-cropped.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-polarist-cropped.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-polarist-cropped.png" />
  <link rel="shortcut icon" href="/favicon-polarist-cropped.png" />

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" href="/favicon-polarist-cropped.png" />

  <title>Polarist</title>
  <meta name="description" content="Tu camino más fácil hacia la IA." />
  <meta property="og:title" content="Polarist" />
  <meta property="og:description"
    content="Tu camino más fácil hacia la IA." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="/Polarist_logo.png" />

  <!-- Auto-Update Script -->
  <script>
    (function() {
      const CHECK_INTERVAL = 5 * 60 * 1000; // 5 minutos
      const VERSION_FILE = '/version.json';
      let currentVersion = null;

      async function checkVersion() {
        try {
          // Agregamos un timestamp para evitar que el navegador cachee el archivo de versión
          const response = await fetch(`${VERSION_FILE}?t=${Date.now()}`);
          if (!response.ok) return;
          
          const data = await response.json();
          const newVersion = data.version;

          if (currentVersion && currentVersion !== newVersion) {
            console.log(`[Polarist] Nueva versión detectada: ${newVersion}. Recargando...`);
            window.location.reload(true);
          } else {
            currentVersion = newVersion;
          }
        } catch (err) {
          console.error('[Polarist] Error al chequear versión:', err);
        }
      }

      // Chequeo inicial
      checkVersion();
      // Chequeo periódico
      setInterval(checkVersion, CHECK_INTERVAL);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx?v=1.0.3"></script>
</body>

</html>
