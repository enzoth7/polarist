<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagina no encontrada | Polarist</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="description" content="La pagina que buscas no existe en Polarist." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #010101;
      --fg: #f6f6f6;
      --muted: rgba(246, 246, 246, 0.72);
      --accent: #cafe5b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(202, 254, 91, 0.12), transparent 30%),
        var(--bg);
      color: var(--fg);
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }

    main {
      max-width: 560px;
      text-align: center;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--accent);
      color: #010101;
      text-decoration: none;
      padding: 14px 22px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Pagina no encontrada</h1>
    <p>La URL que intentaste abrir no existe o ya no esta disponible en Polarist.</p>
    <a href="/">Volver al inicio</a>
  </main>
</body>
</html>
